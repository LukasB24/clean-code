# CleanCode configuration reference.
#
# Every rule is enabled by default. To customize, copy the entries you want
# into your project's pyproject.toml (keeping the [tool.cleancode...] headers)
# and uncomment them. Unknown rule ids or option keys are rejected, so typos
# cannot silently disable a rule.

[tool.cleancode]
# fail_on = "warning"   # info | warning | error: lowest severity that fails a run
# min_severity = "info"  # info | warning | error: lowest severity to display (default: warning)
# disable = []          # rule ids to turn off entirely, e.g. ["NM203"]
# exclude = []          # extra glob patterns to skip, e.g. ["migrations/**"]

# ST101  max-nesting-depth  [error]
#   Limits how deeply loops, conditionals, `with`, and `try` blocks nest inside a function. Deep nesting is the hallmark of hard-to-review generated code.
# [tool.cleancode.ST101]
# max_depth = 2

# ST102  max-function-length  [warning]
#   Limits function length (docstring included) so one function fits one screen.
# [tool.cleancode.ST102]
# max_lines = 60

# ST103  max-class-length  [warning]
#   Limits class length; god classes hide too many responsibilities.
# [tool.cleancode.ST103]
# max_lines = 200

# ST104  max-parameters  [warning]
#   Limits the number of function parameters (self/cls, *args, **kwargs excluded).
# [tool.cleancode.ST104]
# max_params = 3

# ST105  max-complexity  [error]
#   Limits cyclomatic complexity per function: 1 + one per if/for/while/except/assert/ternary/match-case, per comprehension filter, and per extra and/or operand.
# [tool.cleancode.ST105]
# max_complexity = 10

# ST106  do-one-thing  [warning]
#   Flags functions whose name joins responsibilities with a conjunction (`load_and_save`, `fetch_or_default`). Needing 'and'/'or' to name a function is a sign it does more than one thing — split it.
# [tool.cleancode.ST106]
# conjunctions = ["and", "or"]
# allowed_names = []

# ST107  too-many-guard-clauses  [info]
#   Flags a function where one block strings together more than `max_guards` sequential guard clauses (`if cond: continue/return/raise/break`) ahead of the real work. Filtering piled up next to a decision is a 'more than one thing' smell (see ST106): split the eligibility checks into their own filter/predicate function and the remaining logic into another.
# [tool.cleancode.ST107]
# max_guards = 2

# ST108  max-module-length  [warning]
#   Limits how long one module may grow (default 500 lines). A file that keeps absorbing new classes and helpers turns into a grab-bag nobody can navigate — split it into focused submodules, one concern per file, before it gets there.
# [tool.cleancode.ST108]
# max_lines = 500

# ST109  redundant-else  [warning]
#   Flags a plain two-way `if`/`else` whose `if` branch always exits (ends in return/raise/break/continue) — the else adds an indentation level the exit already made unnecessary. Any `if` that is itself part of an `elif` chain is exempt entirely — a multi-way dispatch ladder ending in `else` is idiomatic, not the redundant-nesting shape this targets.
# [tool.cleancode.ST109]

# NM201  short-name  [warning]
#   Flags names shorter than `min_length` characters (default 3) — cryptic pairs like `ab`/`bc`/`df` as much as bare letters. Conventional loop/comprehension/lambda letters (i, j, k, n, x, y) and known short words (id, ok, fh, ...) are allowlisted and configurable; functions, classes, and ordinary variables otherwise always need real names.
# [tool.cleancode.NM201]
# min_length = 3
# allowed = ["i", "j", "k", "n", "x", "y", "_", "id", "ok", "fh"]

# NM202  meaningless-name  [warning]
#   Flags names that say nothing about their content (tmp, data, foo, do_stuff) and numbered generics like `data2` or `result1`.
# [tool.cleancode.NM202]
# banned = ["tmp", "temp", "data", "result", "res", "ret", "retval", "foo", "bar", "baz", "stuff", "thing", "things", "obj", "var", "info", "output", "my_var", "temp_var", "my_list", "my_dict", "arr", "lst", "l"]
# banned_functions = ["process", "handle", "run_stuff", "do_stuff", "do_it", "do_something", "do_work", "process_data", "handle_data", "my_func", "func", "helper", "do_the_thing", "main2"]
# allowed_in_loops = ["item", "value", "val", "element", "entry", "key"]

# NM203  cryptic-abbreviation  [info]
#   Flags vowel-less abbreviation soup like `usr_mgr` or `calc_rslt`. Known abbreviations (cfg, ctx, idx, ...) are allowlisted and configurable.
# [tool.cleancode.NM203]
# known_abbrevs = ["cfg", "ctx", "idx", "db", "fn", "env", "src", "dst", "str", "css", "tmp", "xml", "html", "sql", "std", "cmd", "msg", "pkg", "txt", "sdk", "api", "url", "uri", "gcd", "rgb", "csv", "json", "yml", "js", "ts", "np", "df", "kwargs", "args", "cls", "llm"]

# CM301  docstring-restates-name  [warning]
#   Flags docstrings that say nothing beyond the signature: a short one (`def get_user_name`: """Gets the user name.""") whose words all come from the function/class name and parameters, or a longer one where every line stays within that same vocabulary plus generic filler nouns. A `_`-prefixed (private) name is judged at the much stricter `private_overlap` — it has no external reader to write prose for, only its own body, which the reader can just read instead. Also flags a function docstring whose words are mostly synonyms of its body's operators/keywords (`"""Adds two numbers and returns the sum."""` over `return a + b`), reusing CM302's operator-synonym table against the whole body instead of one annotated line, at `body_overlap`. Why-signal docstrings are exempt from this check, same as CM302.
# [tool.cleancode.CM301]
# overlap = 0.6
# private_overlap = 0.35
# body_overlap = 0.6

# CM302  comment-restates-code  [warning]
#   Flags comments that paraphrase the code line they annotate (`x = x + 1  # increment x by 1`, `for k in range(3):  # iterate three times`). TODO/FIXME/NOTE, tool directives, comments carrying a causal/justification marker (because, since, workaround, ...), and banner/section-divider comments (CM306's territory) are exempt.
# [tool.cleancode.CM302]
# overlap = 0.5
# min_words = 2

# CM303  comment-density  [info]
#   Flags functions with more than ~1 comment line per 3 code lines — a strong smell of generated padding. Docstrings are policed by CM301/CM304, not here.
# [tool.cleancode.CM303]
# max_ratio = 0.3
# min_code_lines = 5

# CM304  boilerplate-param-docs  [warning]
#   Flags Google-style Args:/Returns: sections where entries like `data: The data.` describe nothing beyond the parameter name.
# [tool.cleancode.CM304]
# min_uninformative = 0.5

# CM305  file-comment-density  [warning]
#   Flags a file whose overall comment density exceeds `max_ratio` (default 1 comment line per 5 code lines) — file-wide comment sprawl that CM303 misses when no single function is dense enough on its own. Directive comments (TODO, noqa, `cleancode:`, ...) and docstrings (policed by CM301/CM304) don't count, and files with fewer than `min_code_lines` code lines are never flagged.
# [tool.cleancode.CM305]
# max_ratio = 0.2
# min_code_lines = 30

# CM306  banner-comment  [warning]
#   Flags a decoration-only comment (`# ----------`) or a decoration-framed one (`# ---- Step 1 ----`) — section-divider ceremony that carries no information the code doesn't already show. TODO/FIXME/NOTE and tool directives are exempt, like the other comment rules.
# [tool.cleancode.CM306]

# CM307  docstring-semantic-restatement  [warning]
#   Flags docstrings and standalone comments that only *narrate* what the code does, even when reworded with synonyms ("""Adds two numbers and returns the sum.""" over `return a + b`) — paraphrases the lexical rules (CM301/CM302) structurally cannot see. Each clause is scored by a small pretrained-embedding classifier (see `cleancode.semantics`); a text is flagged only when *every* clause reads as procedural description, so mixed comments that also carry rationale ("... to maximize L1 cache hits") always pass. Scope is deliberately narrow: plain (undecorated) function docstrings of at most `max_lines` lines — a class docstring states responsibility and a decorated function's is framework-facing help text — and whole standalone comment blocks. Texts CM301/CM302 already flag (including CM301's operator-synonym body-overlap check), TODO/directive comments, and why-signal carriers are skipped.
# [tool.cleancode.CM307]
# threshold = 0.25
# min_words = 3
# max_lines = 3

# SL401  complex-subscript  [warning]
#   Scores each subscript expression (+1 per dimension/step/None/ellipsis/negative index/arithmetic/call, +2 per nested subscript, negative steps count double) and flags scores above the threshold.
# [tool.cleancode.SL401]
# max_score = 5

# SL402  chained-subscript  [warning]
#   Flags subscript chains like `grid[i][j][k]`; bind intermediates to names or use multi-dimensional indexing `grid[i, j, k]`.
# [tool.cleancode.SL402]
# max_chain = 2

# TY501  uninformative-any  [warning]
#   Rejects annotations that reduce to bare `Any` (including `Optional[Any]` and `Any | None`) on parameters and return types. `Any` nested in a container such as `dict[str, Any]` is permitted as a justified exception.
# [tool.cleancode.TY501]

# SM601  comprehension-density  [warning]
#   Flags a comprehension that nests another comprehension whose filter condition is itself an inline ternary — logical over-compression that's nearly impossible to read at a glance.
# [tool.cleancode.SM601]

# SM602  anonymous-tuple-indexing  [warning]
#   Flags integer-constant indexing (`bounds[0]`) into a parameter annotated as a fixed multi-element tuple — primitive obsession that hides what each position means. Variadic `tuple[T, ...]` parameters are exempt.
# [tool.cleancode.SM602]

# SM603  magic-string-branching  [warning]
#   Flags inline ternaries (`a if x.startswith('...') else b`) whose branch is chosen by a hardcoded string prefix/suffix/substring check — the domain rule hides inside a string literal instead of a named condition.
# [tool.cleancode.SM603]

# SM604  redundant-boolean-ternary  [warning]
#   Flags ternaries that return explicit `True`/`False` literals for a condition that already evaluates to a boolean (`True if x == y else False`) — the ternary itself is the redundant part.
# [tool.cleancode.SM604]

# SM605  reduce-instead-of-sum  [warning]
#   Flags `functools.reduce(lambda a, b: a + b, xs)` — a built-in `sum(xs)` does the same thing, faster and without the lambda indirection.
# [tool.cleancode.SM605]

# SM606  repeated-collection-iteration  [warning]
#   Flags a comprehension that iterates over a collection expression (`item["metrics"]`, `self.rows`, `get_data()`) already iterated by an earlier comprehension in the same function — two passes where one would do.
# [tool.cleancode.SM606]

# SM607  magic-number  [warning]
#   Flags numeric literals embedded directly in a binary operation or comparison (`threshold * 1.2`) instead of a named, typed constant. A configurable `ignore` list (default 0, 1, -1, 2, 10) exempts domain-agnostic values.
# [tool.cleancode.SM607]
# ignore = [0, 1, -1, 2, 10]

# SM608  non-idiomatic-emptiness-check  [warning]
#   Flags `len(x) > 0` / `len(x) == 0` style checks — Python sequences are already truthy/falsy, so PEP 8 prefers `if x:` / `if not x:`.
# [tool.cleancode.SM608]

# SM609  eager-dataset-loading  [warning]
#   Flags file/array loading calls (`np.load`, `open`, `Image.open`, `cv2.imread`, `torch.load`, ...) inside `__init__` of a `Dataset` subclass — eagerly loading every sample's payload at construction time defeats lazy loading and can OOM on realistic dataset sizes.
# [tool.cleancode.SM609]

# SM610  premature-device-placement  [warning]
#   Flags `.cuda()`/`.to(device=...)` calls inside `__init__` or `__getitem__` of a `Dataset` subclass — initializing a CUDA context before DataLoader workers fork corrupts the context across processes, causing deadlocks or segfaults.
# [tool.cleancode.SM610]

# SM611  redundant-isinstance-check  [warning]
#   Flags `isinstance(x, T)` where `x` already carries a simple static annotation of exactly `T` — the runtime check is hallucinated safety that a type checker already guarantees, and it costs cycles in hot loops like `__getitem__`.
# [tool.cleancode.SM611]

# SM612  unused-binding  [warning]
#   Flags an import that's never referenced anywhere in the module, and a local variable that's assigned inside a function but never read. Names already prefixed with `_`, `__all__` exports, `__init__.py` re-exports, `global`/`nonlocal` names, multi-target unpacking where at least one target is used, and functions that call `locals`/`eval`/`exec` (which can reference locals dynamically) are all exempt.
# [tool.cleancode.SM612]

# SM613  builtin-shadowing  [warning]
#   Flags a binding site (parameter, assignment target, `for`/`with ... as`/comprehension target, function/class name) whose identifier shadows a Python builtin (`id`, `type`, `list`, ...), which can cause confusing bugs if the original builtin is needed later in the same scope. A configurable `watched` list (default: the builtins most often reused as domain terms) limits noise; every entry is still checked against the live `builtins` module rather than a hardcoded copy, so it stays correct across Python versions. Class-body field declarations (`id: ClassVar[str]`, `id = "SM601"`) are exempt — they're field names, not shadowing locals.
# [tool.cleancode.SM613]
# watched = ["id", "type", "list", "dict", "str", "input", "format", "filter", "min", "max", "sum", "hash", "object", "property", "map", "next", "iter"]

# SM614  bool-arithmetic  [warning]
#   Flags an augmented assignment whose right-hand side is a bare comparison or membership test (`count += value in seen`) — a boolean used as a number makes the reader do the int-cast in their head. Deliberately narrow (augmented assignments only), so numpy/torch mask arithmetic is untouched.
# [tool.cleancode.SM614]

# SM615  nested-ternary  [warning]
#   Flags a conditional expression nested inside another conditional expression (`a if x else (b if y else c)`). One ternary reads fine; two levels always need a second pass. Only the outermost ternary of a chain is reported.
# [tool.cleancode.SM615]

# SM616  callable-indirection  [warning]
#   Flags a function that manufactures a callable instead of doing work: it returns a `lambda`, returns a `functools.partial(...)`, or its whole body is `return <name of another function>`. Each is a hop the reviewer must chase to find the actual logic. Returning a nested `def` is not flagged — that's the decorator shape.
# [tool.cleancode.SM616]

# SM617  deep-expression  [warning]
#   Flags a statement whose expression tree nests operations (calls, arithmetic, ternaries, comprehensions, f-strings) deeper than `max_depth` (default 4). A flat chain of conditions reads fine at any length; five layers of calls-inside-f-strings-inside-comprehensions on one line do not. Module-level statements (constant tables) are exempt. Complements ST101, which limits statement nesting rather than expression nesting.
# [tool.cleancode.SM617]
# max_depth = 4

# SM618  thin-delegation-wrapper  [warning]
#   Flags a private function whose whole body is `return <one call to another function>` — a wrapper that only renames work and adds a hop the reviewer must chase. Public functions (API conveniences), decorated functions, dunders, builtin-wrapping one-liners (`return any(...)`), and calls on the function's own parameters are exempt.
# [tool.cleancode.SM618]

# SM619  buried-value-fallback  [warning]
#   Flags an `or`/`and` value fallback buried inside a larger expression (`(node.end_lineno or node.lineno) + 1`) — used as an arithmetic operand or subscript index, the boolean operator is easy to misread. A bare `x = a or b` and ordinary boolean conditions stay exempt.
# [tool.cleancode.SM619]

# SM620  returned-temp  [warning]
#   Flags `name = expr` immediately followed by `return name`, where `name` has no other use in the function — the assignment adds a name but no information. An annotated assignment (`name: T = expr`) is exempt, since the annotation itself is informative.
# [tool.cleancode.SM620]

# SM621  compatibility-alias  [warning]
#   Flags a module-level `alias = original` where `original` is a function/class defined in the same file — a second name for something that already has one. ALL_CAPS targets, `_`-prefixed targets, and annotated assignments (`TypeAlias`) are exempt.
# [tool.cleancode.SM621]

# SM622  trivial-property-pair  [warning]
#   Flags a `@property` whose body is exactly `return self._x` together with a matching `@x.setter` whose body is exactly `self._x = value` — both trivial, mirroring a private attribute with no logic in between. A getter-only read-only property (no matching setter) is a legitimate idiom and is exempt; any validation or computation in either accessor exempts the pair.
# [tool.cleancode.SM622]

# SD801  type-switch-violates-ocp  [warning]
#   Flags an if/elif chain of `min_branches`-or-more (default 3) branches that each test `isinstance(x, ...)`/`type(x) is ...` against the same variable — adding a new type means editing this chain instead of extending via polymorphism, the classic Open/Closed Principle violation.
# [tool.cleancode.SD801]
# min_branches = 3

# SD802  low-cohesion-class  [warning]
#   Flags a class whose instance methods split into two or more *multi-member* groups that share no instance attribute and never call each other — a concrete proxy for 'this class does more than one thing' (SRP), beyond the line-count check in ST103. A single method with no shared state (a stray pure helper) does not count as its own group — only genuine clusters of mutually-related methods do. Dunder methods and @staticmethod/@classmethod helpers are always excluded; classes whose name ends with one of `exempt_name_suffixes` (default `Mixin`, since mixins are intentionally composed from independent, reusable behavior) are exempt entirely.
# [tool.cleancode.SD802]
# min_methods = 4
# exempt_name_suffixes = ["Mixin"]

# SD803  class-as-namespace  [warning]
#   Flags a class with no base classes, no decorators, and no class-level state whose entire body (docstring aside) is `min_methods`-or-more `@staticmethod`s — the class carries no state, so the module is already the namespace it's imitating.
# [tool.cleancode.SD803]
# min_methods = 2

# DP701  duplicate-function-body  [warning]
#   Flags two or more functions/methods, anywhere in the analyzed files, whose bodies are structurally identical once names are ignored — copy-paste DRY violations a single-file rule can't see. Stub bodies (pass/.../raise NotImplementedError), dunder methods, and bodies shorter than `min_statements` are exempt.
# [tool.cleancode.DP701]
# min_statements = 4

# DP702  identical-function-implementation  [warning]
#   Flags two or more functions/methods whose bodies are exactly identical, identifiers included — the same implementation pasted twice, like a private helper that drifted into a second module. Requiring identifiers to match is what lets this rule inspect much shorter bodies (default 2 statements) than DP701 without noise; bodies long enough for DP701 to report are left to DP701. Stub bodies and dunder methods are exempt.
# [tool.cleancode.DP702]
# min_statements = 2

# PY901  bare-except  [warning]
#   Flags `except:` with no exception type at all — it catches `KeyboardInterrupt` and `SystemExit` along with genuine bugs, silently absorbing signals that should propagate. `except Exception:` is merely broad, not bare, and is not flagged.
# [tool.cleancode.PY901]

# PY902  empty-exception-handler  [warning]
#   Flags an exception handler whose entire body is inert (`pass`, a bare `...`, or a lone string literal, in any combination) — the failure is silently discarded with no log, fallback, or re-raise. Handlers that `continue`/`return`/`break`, log, or re-raise are real control-flow decisions and are not flagged.
# [tool.cleancode.PY902]

# PY903  oversized-try  [warning]
#   Flags a `try` block with more than `max_statements` top-level statements feeding a bare or `except Exception`/`BaseException` handler — the handler can't know which of several steps actually failed. A `try` narrowed to a specific exception, or a broad handler wrapping few statements, is not flagged.
# [tool.cleancode.PY903]
# max_statements = 3

