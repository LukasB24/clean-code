# CleanCode configuration reference.
#
# Every rule is enabled by default. To customize, copy the entries you want
# into your project's pyproject.toml (keeping the [tool.cleancode...] headers)
# and uncomment them. Unknown rule ids or option keys are rejected, so typos
# cannot silently disable a rule.

[tool.cleancode]
# fail_on = "warning"   # info | warning | error: lowest severity that fails a run
# min_severity = "info"  # info | warning | error: lowest severity to display (default: warning)
# disable = []          # rule ids to turn off entirely, e.g. ["NM203"]
# exclude = []          # extra glob patterns to skip, e.g. ["migrations/**"]

# ST101  max-nesting-depth  [error]
#   Limits how deeply loops, conditionals, `with`, and `try` blocks nest inside a function. Deep nesting is the hallmark of hard-to-review generated code.
# [tool.cleancode.ST101]
# max_depth = 2

# ST102  max-function-length  [warning]
#   Limits function length (docstring included) so one function fits one screen.
# [tool.cleancode.ST102]
# max_lines = 60

# ST103  max-class-length  [warning]
#   Limits class length; god classes hide too many responsibilities.
# [tool.cleancode.ST103]
# max_lines = 200

# ST104  max-parameters  [warning]
#   Limits the number of function parameters (self/cls, *args, **kwargs excluded).
# [tool.cleancode.ST104]
# max_params = 3

# ST105  max-complexity  [error]
#   Limits cyclomatic complexity per function: 1 + one per if/for/while/except/assert/ternary/match-case, per comprehension filter, and per extra and/or operand.
# [tool.cleancode.ST105]
# max_complexity = 10

# ST106  do-one-thing  [warning]
#   Flags functions whose name joins responsibilities with a conjunction (`load_and_save`, `fetch_or_default`). Needing 'and'/'or' to name a function is a sign it does more than one thing — split it.
# [tool.cleancode.ST106]
# conjunctions = ["and", "or"]
# allowed_names = []

# ST107  too-many-guard-clauses  [info]
#   Flags a function where one block strings together more than `max_guards` sequential guard clauses (`if cond: continue/return/raise/break`) ahead of the real work. Filtering piled up next to a decision is a 'more than one thing' smell (see ST106): split the eligibility checks into their own filter/predicate function and the remaining logic into another.
# [tool.cleancode.ST107]
# max_guards = 2

# NM201  short-name  [warning]
#   Flags names shorter than `min_length` characters (default 3) — cryptic pairs like `ab`/`bc`/`df` as much as bare letters. Conventional loop/comprehension/lambda letters (i, j, k, n, x, y) and known short words (id, ok, fh, ...) are allowlisted and configurable; functions, classes, and ordinary variables otherwise always need real names.
# [tool.cleancode.NM201]
# min_length = 3
# allowed = ["i", "j", "k", "n", "x", "y", "_", "id", "ok", "fh"]

# NM202  meaningless-name  [warning]
#   Flags names that say nothing about their content (tmp, data, foo, do_stuff) and numbered generics like `data2` or `result1`.
# [tool.cleancode.NM202]
# banned = ["tmp", "temp", "data", "result", "res", "ret", "retval", "foo", "bar", "baz", "stuff", "thing", "things", "obj", "var", "info", "output", "my_var", "temp_var", "my_list", "my_dict", "arr", "lst", "l"]
# banned_functions = ["process", "handle", "run_stuff", "do_stuff", "do_it", "do_something", "do_work", "process_data", "handle_data", "my_func", "func", "helper", "do_the_thing", "main2"]
# allowed_in_loops = ["item", "value", "val", "element", "entry", "key"]

# NM203  cryptic-abbreviation  [info]
#   Flags vowel-less abbreviation soup like `usr_mgr` or `calc_rslt`. Known abbreviations (cfg, ctx, idx, ...) are allowlisted and configurable.
# [tool.cleancode.NM203]
# known_abbrevs = ["cfg", "ctx", "idx", "db", "fn", "env", "src", "dst", "str", "css", "tmp", "xml", "html", "sql", "std", "cmd", "msg", "pkg", "txt", "sdk", "api", "url", "uri", "gcd", "rgb", "csv", "json", "yml", "js", "ts", "np", "df", "kwargs", "args", "cls", "llm"]

# CM301  docstring-restates-name  [warning]
#   Flags short docstrings whose words all come from the function signature (`def get_user_name`: """Gets the user name.""") — they cost reading time and add nothing.
# [tool.cleancode.CM301]
# overlap = 0.8

# CM302  comment-restates-code  [warning]
#   Flags comments that paraphrase the code line they annotate (`x = x + 1  # increment x by 1`, `for k in range(3):  # iterate three times`). TODO/FIXME/NOTE, tool directives, and comments carrying a causal/justification marker (because, since, workaround, ...) are exempt.
# [tool.cleancode.CM302]
# overlap = 0.7
# min_words = 2

# CM303  comment-density  [info]
#   Flags functions with more than ~1 comment line per 3 code lines — a strong smell of generated padding. Docstrings are policed by CM301/CM304, not here.
# [tool.cleancode.CM303]
# max_ratio = 0.3
# min_code_lines = 5

# CM304  boilerplate-param-docs  [warning]
#   Flags Google-style Args:/Returns: sections where entries like `data: The data.` describe nothing beyond the parameter name.
# [tool.cleancode.CM304]
# min_uninformative = 0.5

# SL401  complex-subscript  [warning]
#   Scores each subscript expression (+1 per dimension/step/None/ellipsis/negative index/arithmetic/call, +2 per nested subscript, negative steps count double) and flags scores above the threshold.
# [tool.cleancode.SL401]
# max_score = 5

# SL402  chained-subscript  [warning]
#   Flags subscript chains like `grid[i][j][k]`; bind intermediates to names or use multi-dimensional indexing `grid[i, j, k]`.
# [tool.cleancode.SL402]
# max_chain = 2

# TY501  uninformative-any  [warning]
#   Rejects annotations that reduce to bare `Any` (including `Optional[Any]` and `Any | None`) on parameters and return types. `Any` nested in a container such as `dict[str, Any]` is permitted as a justified exception.
# [tool.cleancode.TY501]

# SM601  comprehension-density  [warning]
#   Flags a comprehension that nests another comprehension whose filter condition is itself an inline ternary — logical over-compression that's nearly impossible to read at a glance.
# [tool.cleancode.SM601]

# SM602  anonymous-tuple-indexing  [warning]
#   Flags integer-constant indexing (`bounds[0]`) into a parameter annotated as a fixed multi-element tuple — primitive obsession that hides what each position means. Variadic `tuple[T, ...]` parameters are exempt.
# [tool.cleancode.SM602]

# SM603  magic-string-branching  [warning]
#   Flags inline ternaries (`a if x.startswith('...') else b`) whose branch is chosen by a hardcoded string prefix/suffix/substring check — the domain rule hides inside a string literal instead of a named condition.
# [tool.cleancode.SM603]

# SM604  redundant-boolean-ternary  [warning]
#   Flags ternaries that return explicit `True`/`False` literals for a condition that already evaluates to a boolean (`True if x == y else False`) — the ternary itself is the redundant part.
# [tool.cleancode.SM604]

# SM605  reduce-instead-of-sum  [warning]
#   Flags `functools.reduce(lambda a, b: a + b, xs)` — a built-in `sum(xs)` does the same thing, faster and without the lambda indirection.
# [tool.cleancode.SM605]

# SM606  repeated-collection-iteration  [warning]
#   Flags a comprehension that iterates over a collection expression (`item["metrics"]`, `self.rows`, `get_data()`) already iterated by an earlier comprehension in the same function — two passes where one would do.
# [tool.cleancode.SM606]

# SM607  magic-number  [warning]
#   Flags numeric literals embedded directly in a binary operation or comparison (`threshold * 1.2`) instead of a named, typed constant. A configurable `ignore` list (default 0, 1, -1, 2, 10) exempts domain-agnostic values.
# [tool.cleancode.SM607]
# ignore = [0, 1, -1, 2, 10]

# SM608  non-idiomatic-emptiness-check  [warning]
#   Flags `len(x) > 0` / `len(x) == 0` style checks — Python sequences are already truthy/falsy, so PEP 8 prefers `if x:` / `if not x:`.
# [tool.cleancode.SM608]

# SM609  eager-dataset-loading  [warning]
#   Flags file/array loading calls (`np.load`, `open`, `Image.open`, `cv2.imread`, `torch.load`, ...) inside `__init__` of a `Dataset` subclass — eagerly loading every sample's payload at construction time defeats lazy loading and can OOM on realistic dataset sizes.
# [tool.cleancode.SM609]

# SM610  premature-device-placement  [warning]
#   Flags `.cuda()`/`.to(device=...)` calls inside `__init__` or `__getitem__` of a `Dataset` subclass — initializing a CUDA context before DataLoader workers fork corrupts the context across processes, causing deadlocks or segfaults.
# [tool.cleancode.SM610]

# SM611  redundant-isinstance-check  [warning]
#   Flags `isinstance(x, T)` where `x` already carries a simple static annotation of exactly `T` — the runtime check is hallucinated safety that a type checker already guarantees, and it costs cycles in hot loops like `__getitem__`.
# [tool.cleancode.SM611]

# SD801  type-switch-violates-ocp  [warning]
#   Flags an if/elif chain of `min_branches`-or-more (default 3) branches that each test `isinstance(x, ...)`/`type(x) is ...` against the same variable — adding a new type means editing this chain instead of extending via polymorphism, the classic Open/Closed Principle violation.
# [tool.cleancode.SD801]
# min_branches = 3

# SD802  low-cohesion-class  [warning]
#   Flags a class whose instance methods split into two or more *multi-member* groups that share no instance attribute and never call each other — a concrete proxy for 'this class does more than one thing' (SRP), beyond the line-count check in ST103. A single method with no shared state (a stray pure helper) does not count as its own group — only genuine clusters of mutually-related methods do. Dunder methods and @staticmethod/@classmethod helpers are always excluded; classes whose name ends with one of `exempt_name_suffixes` (default `Mixin`, since mixins are intentionally composed from independent, reusable behavior) are exempt entirely.
# [tool.cleancode.SD802]
# min_methods = 4
# exempt_name_suffixes = ["Mixin"]

# DP701  duplicate-function-body  [warning]
#   Flags two or more functions/methods, anywhere in the analyzed files, whose bodies are structurally identical once names are ignored — copy-paste DRY violations a single-file rule can't see. Stub bodies (pass/.../raise NotImplementedError), dunder methods, and bodies shorter than `min_statements` are exempt.
# [tool.cleancode.DP701]
# min_statements = 4

