<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" role="img" aria-labelledby="title desc">
  <title id="title">clean-code: before and after</title>
  <desc id="desc">A messy, deeply-nested LLM-generated function on the left becomes a short, well-named function on the right after clean-code's suggested fixes are applied.</desc>
  <defs>
    <style>
      .panel { fill: #1e1e2e; stroke: #45475a; stroke-width: 1.5; }
      .code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 13px; }
      .dim { fill: #7f849c; }
      .fg { fill: #cdd6f4; }
      .warn { fill: #f9a825; }
      .bad-underline { stroke: #f38ba8; stroke-width: 2; fill: none; }
      .good-underline { stroke: #a6e3a1; stroke-width: 2; fill: none; }
      .arrow { stroke: #cdd6f4; stroke-width: 2.5; fill: none; }
      .arrowhead { fill: #cdd6f4; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; }
      .label-bad { fill: #f38ba8; }
      .label-good { fill: #a6e3a1; }
    </style>
  </defs>

  <!-- left panel: messy -->
  <rect class="panel" x="16" y="16" width="330" height="188" rx="10"/>
  <text class="label label-bad" x="34" y="40">BEFORE</text>
  <text class="code fg" x="34" y="66">def process_data(data):</text>
  <text class="code dim" x="50" y="86">for item in data:</text>
  <text class="code dim" x="66" y="106">if item is not None:</text>
  <text class="code dim" x="82" y="126">if item.qty &gt; 0:</text>
  <text class="code fg" x="98" y="146">result.append(item.price)</text>
  <path class="bad-underline" d="M 30 71 h 130"/>
  <text class="code dim" x="34" y="176">return result</text>
  <path class="bad-underline" d="M 232 171 h 46"/>

  <!-- arrow -->
  <path class="arrow" d="M 358 110 h 66"/>
  <path class="arrowhead" d="M 424 110 l -12 -7 v 14 z"/>
  <text class="label fg" x="358" y="96" text-anchor="middle" style="fill:#7f849c;">clean-code check</text>

  <!-- right panel: clean -->
  <rect class="panel" x="454" y="16" width="330" height="188" rx="10"/>
  <text class="label label-good" x="472" y="40">AFTER</text>
  <text class="code fg" x="472" y="66">def positive_priced_items(rows):</text>
  <text class="code dim" x="488" y="86">return [</text>
  <text class="code dim" x="504" y="106">row.price for row in rows</text>
  <text class="code dim" x="504" y="126">if row and row.qty &gt; 0</text>
  <text class="code dim" x="488" y="146">]</text>
  <path class="good-underline" d="M 468 71 h 190"/>
</svg>
